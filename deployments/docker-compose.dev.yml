version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bktrader
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2
    ports:
      - "4222:4222"

volumes:
  postgres_data:

