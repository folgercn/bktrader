x-app-image: &app-image
    image: ${IMAGE_REPO:-ghcr.io/folgercn/bktrader-app}:${IMAGE_TAG:-latest}
    mem_limit: ${APP_MEM_LIMIT:-768m}
    memswap_limit: ${APP_MEMSWAP_LIMIT:-1g}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-./.env}
    environment:
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
    volumes:
      - ../logs:/app/logs
    depends_on:
      - postgres
      - redis
      - nats

services:
  platform-api:
    <<: *app-image
    container_name: bktrader-platform-api
    command: ["platform-api"]
    environment:
      BKTRADER_ROLE: api
      AUTO_MIGRATE: ${API_AUTO_MIGRATE:-true}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
    ports:
      - "8080:8080"

  live-runner:
    <<: *app-image
    container_name: bktrader-live-runner
    command: ["platform-worker"]
    mem_limit: ${LIVE_RUNNER_MEM_LIMIT:-1536m}
    memswap_limit: ${LIVE_RUNNER_MEMSWAP_LIMIT:-2g}
    environment:
      BKTRADER_ROLE: live-runner
      AUTO_MIGRATE: "false"
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}

  signal-runtime-runner:
    <<: *app-image
    container_name: bktrader-signal-runtime-runner
    command: ["platform-worker"]
    mem_limit: ${SIGNAL_RUNTIME_MEM_LIMIT:-1024m}
    memswap_limit: ${SIGNAL_RUNTIME_MEMSWAP_LIMIT:-1536m}
    environment:
      BKTRADER_ROLE: signal-runtime-runner
      AUTO_MIGRATE: "false"
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}

  notification-worker:
    <<: *app-image
    container_name: bktrader-notification-worker
    command: ["platform-worker"]
    mem_limit: ${NOTIFICATION_WORKER_MEM_LIMIT:-256m}
    memswap_limit: ${NOTIFICATION_WORKER_MEMSWAP_LIMIT:-512m}
    environment:
      BKTRADER_ROLE: notification-worker
      AUTO_MIGRATE: "false"
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}

  postgres:
    image: postgres:16
    container_name: bktrader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bktrader}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bktrader-redis
    restart: unless-stopped

  nats:
    image: nats:2
    container_name: bktrader-nats
    restart: unless-stopped

volumes:
  postgres_data:
