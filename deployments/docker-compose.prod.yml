services:
  app:
    image: ${IMAGE_REPO:-ghcr.io/folgercn/bktrader-app}:${IMAGE_TAG:-latest}
    container_name: bktrader-app
    mem_limit: ${APP_MEM_LIMIT:-512m}
    memswap_limit: ${APP_MEMSWAP_LIMIT:-512m}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-./.env}
    environment:
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      LOG_MAX_SIZE_MB: ${LOG_MAX_SIZE_MB:-100}
    ports:
      - "8080:8080"
    volumes:
      - ../logs:/app/logs
    depends_on:
      - postgres
      - redis
      - nats

  postgres:
    image: postgres:16
    container_name: bktrader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bktrader}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bktrader-redis
    restart: unless-stopped

  nats:
    image: nats:2
    container_name: bktrader-nats
    restart: unless-stopped

volumes:
  postgres_data:
