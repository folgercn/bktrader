name: Release CLI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build, for example ctl-v20260427123000-abcdef0.'
        required: true
  push:
    tags:
      - 'v*'
      - 'ctl-v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Matrix
        run: |
          mkdir -p dist
          platforms=(
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            platform_split=(${platform//\// })
            GOOS=${platform_split[0]}
            GOARCH=${platform_split[1]}
            
            output_name="bktrader-ctl-$GOOS-$GOARCH"
            
            echo "Building $output_name..."
            env GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags "-X main.Version=${RELEASE_TAG} -X main.Commit=${GITHUB_SHA} -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "dist/$output_name" ./cmd/bktrader-ctl
          done

          # ubuntu-latest intentionally provides sha256sum for release checksums.
          cd dist && sha256sum * > checksums.txt && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          make_latest: ${{ startsWith(env.RELEASE_TAG, 'v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
