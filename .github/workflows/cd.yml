name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bktrader
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy on Macmini runner
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: [MacminiM2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment directory
        run: |
          mkdir -p /Users/fujun/services/bktrader/deployments
          mkdir -p /Users/fujun/services/bktrader/scripts
          cp deployments/docker-compose.prod.yml /Users/fujun/services/bktrader/deployments/docker-compose.prod.yml
          cp scripts/deploy.sh /Users/fujun/services/bktrader/scripts/deploy.sh
          chmod +x /Users/fujun/services/bktrader/scripts/deploy.sh

      - name: Validate deploy secrets
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          test -n "$GHCR_USERNAME" || { echo "Missing secret: GHCR_USERNAME" >&2; exit 1; }
          test -n "$GHCR_TOKEN" || { echo "Missing secret: GHCR_READ_TOKEN" >&2; exit 1; }

      - name: Deploy via docker compose
        env:
          DEPLOY_PATH: /Users/fujun/services/bktrader
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/bktrader
          IMAGE_TAG: latest
          APP_ENV_FILE: /Users/fujun/services/bktrader/.env
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          bash /Users/fujun/services/bktrader/scripts/deploy.sh
